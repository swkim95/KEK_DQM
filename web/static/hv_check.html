<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>autoTB · HV Check</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif;
               background: #0f1117; color: #dde1f0; }
  body { display: flex; flex-direction: column; }

  /* ── Top bar ── */
  #top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #2c2f3e; background: #1a1d27;
    flex-shrink: 0;
  }
  #top-left { display: flex; align-items: center; gap: 10px; }
  #top-left img { height: 22px; }
  #top-title { font-size: 14px; font-weight: 600; color: #4f8ef7; }
  #top-right { display: flex; align-items: center; gap: 8px; }
  #timestamp { font-size: 11px; color: #7a7f99; min-width: 170px; text-align: right; }

  button {
    background: #23273a; color: #dde1f0;
    border: 1px solid #3a4159; border-radius: 4px;
    padding: 5px 11px; font-size: 12px; cursor: pointer;
  }
  button:hover { border-color: #4f8ef7; color: #fff; }
  button.active { background: #2a3a5e; border-color: #4f8ef7; color: #4f8ef7; }

  /* ── Content area ── */
  #content { flex: 1; overflow: auto; padding: 12px 14px; }

  /* ── Error / loading ── */
  #msg { font-size: 13px; color: #9ca0b8; padding: 20px 0; }
  #msg.error { color: #f44336; }

  /* ── Table view ── */
  #tbl-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    table-layout: fixed;
  }
  colgroup .col-ch     { width: 52px; }
  colgroup .col-name   { width: 90px; }
  colgroup .col-status { width: 70px; }
  colgroup .col-exp    { width: 78px; }
  colgroup .col-num    { width: 78px; }

  thead th {
    background: #1a1d27; color: #7a7f99; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.4px; font-size: 10px;
    padding: 7px 10px; text-align: right; border-bottom: 1px solid #2c2f3e;
    white-space: nowrap;
  }
  thead th:nth-child(1), thead th:nth-child(2) { text-align: left; }
  thead th:nth-child(3) { text-align: center; }

  tbody tr { border-bottom: 1px solid #1e2233; }
  tbody tr:hover { background: #1e2233; }
  tbody tr.trip-row { background: #2a0f14; }
  tbody tr.trip-row:hover { background: #35131a; }
  tbody td {
    padding: 6px 10px; font-family: 'SF Mono','Fira Code',monospace;
    font-size: 12px; text-align: right; white-space: nowrap;
  }
  tbody tr.trip-row td { color: #ff8a9a; }
  tbody td:nth-child(1) { text-align: left; color: #7a7f99; }
  tbody td:nth-child(2) { text-align: left; color: #dde1f0; font-weight: 600; }
  tbody td:nth-child(3) { text-align: center; }

  /* Status badge */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 600;
  }
  .badge-on   { background: #2c2c2c; color: #f2f2f2; }
  .badge-off  { background: #2a2a2a; color: #ffffff; }
  .badge-up   { background: #2c2c2c; color: #f1f1f1; }
  .badge-down { background: #2c2c2c; color: #efefef; }
  .badge-trip { background: #5a0000; color: #ff1744; }
  .badge-unk  { background: #1f2235; color: #7a7f99; }
  .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .dot-on   { background: #f2f2f2; }
  .dot-off  { background: #ffffff; }
  .dot-up   { background: #f1f1f1; }
  .dot-down { background: #efefef; }
  .dot-trip { background: #ff1744; }
  .dot-unk  { background: #7a7f99; }

  /* VMon deviation highlight */
  .vmon-warn { color: #dde1f0; }
  .vmon-ok   { color: #dde1f0; }

  /* ── Raw view ── */
  #raw {
    font-family: 'SF Mono','Fira Code','Courier New',monospace;
    font-size: 12px; line-height: 1.5; color: #c5cae9;
    background: #0a0c14; border-radius: 4px;
    padding: 12px; white-space: pre-wrap; word-break: break-word;
  }
  .hidden { display: none; }
</style>
</head>
<body>
<div id="top">
  <div id="top-left">
    <img src="/static/DREAM_LOGO.png" alt="DREAM" />
    <span id="top-title">HV Status · All Channels</span>
  </div>
  <div id="top-right">
    <button id="view-btn">Raw 보기</button>
    <button id="expert-btn">전문가모드: 꺼짐</button>
    <button id="refresh-btn">새로고침</button>
    <button id="auto-btn" class="active">자동 갱신: 2초</button>
    <div id="timestamp">대기 중</div>
  </div>
</div>

<div id="content">
  <div id="msg">로딩 중...</div>
  <div id="tbl-wrap" style="display:none">
    <table id="hv-table">
      <colgroup>
        <col class="col-ch" /><col class="col-name" /><col class="col-status" />
        <col class="col-num" /><col class="col-num" />
        <col class="col-num" /><col class="col-num" />
        <col class="col-exp" /><col class="col-exp" /><col class="col-exp" />
      </colgroup>
      <thead>
        <tr>
          <th>Ch</th><th>Name</th><th>Status</th>
          <th>VMon (V)</th><th>IMon (uA)</th>
          <th>V0Set (V)</th><th>I0Set (uA)</th>
          <th class="expert-col hidden">RUp (V/s)</th>
          <th class="expert-col hidden">RDown (V/s)</th>
          <th class="expert-col hidden">VMax (V)</th>
        </tr>
      </thead>
      <tbody id="hv-tbody"></tbody>
    </table>
  </div>
  <pre id="raw" style="display:none"></pre>
</div>

<script>
const msgEl      = document.getElementById('msg');
const tblWrap    = document.getElementById('tbl-wrap');
const tbody      = document.getElementById('hv-tbody');
const rawEl      = document.getElementById('raw');
const tsEl       = document.getElementById('timestamp');
const autoBtn    = document.getElementById('auto-btn');
const expertBtn  = document.getElementById('expert-btn');
const refreshBtn = document.getElementById('refresh-btn');
const viewBtn    = document.getElementById('view-btn');

let timerAuto = null;
const AUTO_CHOICES = [1000, 2000, 5000]; // 1s / 2s / 5s
let autoIdx = 1; // default: 2000ms
let autoMs = AUTO_CHOICES[autoIdx];
let showRaw = false;
let lastRaw = '';
let lastRows = null;
let expertMode = false;

/* ── View toggle ── */
viewBtn.addEventListener('click', () => {
  showRaw = !showRaw;
  viewBtn.textContent = showRaw ? '표 보기' : 'Raw 보기';
  render();
});

function render() {
  if (!lastRaw) return;
  if (showRaw || !lastRows) {
    tblWrap.style.display = 'none';
    rawEl.style.display   = 'block';
    rawEl.textContent     = lastRaw;
    msgEl.style.display   = 'none';
  } else {
    rawEl.style.display   = 'none';
    tblWrap.style.display = 'block';
    msgEl.style.display   = 'none';
    renderTable(lastRows);
  }
}

/* ── Table rendering ── */
function renderTable(rows) {
  tbody.innerHTML = '';
  rows.forEach(r => {
    const tr = document.createElement('tr');
    const st = (r.status || '').toLowerCase();
    if (st === 'trip') tr.classList.add('trip-row');

    // Ch
    const tdCh = document.createElement('td');
    tdCh.textContent = r.ch_label || '-';
    tr.appendChild(tdCh);

    // Name
    const tdName = document.createElement('td');
    tdName.textContent = r.name || '-';
    tr.appendChild(tdName);

    // Status
    const tdSt = document.createElement('td');
    if (st === 'on') {
      tdSt.innerHTML = '<span class="badge badge-on"><span class="dot dot-on"></span>On</span>';
    } else if (st === 'off') {
      tdSt.innerHTML = '<span class="badge badge-off"><span class="dot dot-off"></span>Off</span>';
    } else if (st === 'up') {
      tdSt.innerHTML = '<span class="badge badge-up"><span class="dot dot-up"></span>Up</span>';
    } else if (st === 'down') {
      tdSt.innerHTML = '<span class="badge badge-down"><span class="dot dot-down"></span>Down</span>';
    } else if (st === 'trip') {
      tdSt.innerHTML = '<span class="badge badge-trip"><span class="dot dot-trip"></span>Trip</span>';
    } else {
      tdSt.innerHTML = `<span class="badge badge-unk"><span class="dot dot-unk"></span>${r.status || '-'}</span>`;
    }
    tr.appendChild(tdSt);

    // VMon vs V0Set
    const vmon  = parseFloat(r.vmon);
    const v0set = parseFloat(r.v0set);
    const tdVMon = document.createElement('td');
    if (!isNaN(vmon) && !isNaN(v0set)) {
      const diff = Math.abs(vmon - v0set);
      tdVMon.textContent = vmon.toFixed(2);
      tdVMon.className = diff > 5 ? 'vmon-warn' : 'vmon-ok';
      if (diff > 5) tdVMon.title = `V0Set: ${v0set} · 차이: ${diff.toFixed(1)} V`;
    } else {
      tdVMon.textContent = r.vmon || '-';
    }
    tr.appendChild(tdVMon);

    // IMon
    const tdIMon = document.createElement('td');
    const imon = parseFloat(r.imon);
    tdIMon.textContent = !isNaN(imon) ? imon.toFixed(3) : (r.imon || '-');
    tr.appendChild(tdIMon);

    // V0Set
    const tdV0Set = document.createElement('td');
    tdV0Set.textContent = r.v0set || '-';
    tr.appendChild(tdV0Set);

    // I0Set
    const tdI0Set = document.createElement('td');
    tdI0Set.textContent = r.i0set || '-';
    tr.appendChild(tdI0Set);

    // Expert columns
    const tdRUp = document.createElement('td');
    tdRUp.className = 'expert-col' + (expertMode ? '' : ' hidden');
    tdRUp.textContent = r.rup || '-';
    tr.appendChild(tdRUp);

    const tdRDown = document.createElement('td');
    tdRDown.className = 'expert-col' + (expertMode ? '' : ' hidden');
    tdRDown.textContent = r.rdown || '-';
    tr.appendChild(tdRDown);

    const tdVMax = document.createElement('td');
    tdVMax.className = 'expert-col' + (expertMode ? '' : ' hidden');
    tdVMax.textContent = r.vmax || '-';
    tr.appendChild(tdVMax);

    tbody.appendChild(tr);
  });
}

/* ── Parser ──
   HVWrappdemo --Status --VMon --IMon --V0Set --I0Set 출력에서
   "📄 Output:" 이후 섹션을 파싱.

   헤더 행(ch/name/status/vmon 중 2개 이상 포함)을 찾고,
   이후 숫자로 시작하는 행들을 채널 데이터로 파싱.
   파싱 실패 시 null 반환 → Raw 텍스트 폴백.
*/
function parseHvOutput(raw) {
  const outMarker = '📄 Output:';
  const markerIdx = raw.indexOf(outMarker);
  const section = markerIdx >= 0 ? raw.slice(markerIdx + outMarker.length) : raw;

  const lines = section
    .split('\n')
    .map(l => l.trim())
    .filter(l => l)
    .filter(l => !/^(📊|📋|💻|⏰|⚠️|❌)/.test(l))
    .filter(l => !/^command\s*:/i.test(l));

  if (!lines.length) return null;

  const rows = [];

  // Raw 예시:
  // 02-00 (T1C) Status = Off VMon = 0.00 IMon = 0.00 V0Set = 855.00 I0Set = 500.00
  const lineRe = /^(\d{1,2})-(\d{1,2})\s+\(([^)]*)\)\s+Status\s*=\s*(\S+)\s+VMon\s*=\s*([+-]?\d+(?:\.\d+)?)\s+IMon\s*=\s*([+-]?\d+(?:\.\d+)?)\s+V0Set\s*=\s*([+-]?\d+(?:\.\d+)?)\s+I0Set\s*=\s*([+-]?\d+(?:\.\d+)?)(.*)$/i;

  for (const line of lines) {
    const m = line.match(lineRe);
    if (!m) continue;

    const crate = parseInt(m[1], 10);
    const chan = parseInt(m[2], 10);
    const name = m[3] && m[3] !== 'None' ? m[3] : '-';
    const status = m[4];
    const tail = m[9] || '';

    const pick = (re) => {
      const mm = tail.match(re);
      return mm ? mm[1] : '-';
    };
    const rup = pick(/\bRUp\s*=\s*([+-]?\d+(?:\.\d+)?)/i);
    const rdown = pick(/\bRDWn\s*=\s*([+-]?\d+(?:\.\d+)?)/i);
    const vmax = pick(/\bSVMax\s*=\s*([+-]?\d+(?:\.\d+)?)/i);

    rows.push({
      crate,
      chan,
      ch_label: `${crate}-${String(chan).padStart(2, '0')}`,
      name,
      status,
      vmon: m[5],
      imon: m[6],
      v0set: m[7],
      i0set: m[8],
      rup,
      rdown,
      vmax,
    });
  }

  if (!rows.length) return null;
  rows.sort((a, b) => (a.crate - b.crate) || (a.chan - b.chan));
  return rows;
}

/* ── Fetch ── */
async function loadStatus() {
  try {
    const res  = await fetch('/api/hv/status-all?t=' + Date.now() + (expertMode ? '&expert=1' : ''));
    const data = await res.json();
    if (!res.ok || data.ok === false) throw new Error(data.error || `HTTP ${res.status}`);

    lastRaw  = data.output || '(출력 없음)';
    lastRows = parseHvOutput(lastRaw);

    tsEl.textContent = '마지막: ' + new Date().toLocaleTimeString();
    render();
  } catch (e) {
    msgEl.textContent  = '조회 실패: ' + e.message;
    msgEl.className    = 'error';
    msgEl.style.display = 'block';
    tblWrap.style.display = 'none';
    rawEl.style.display   = 'none';
    tsEl.textContent = '오류';
  }
}

function setExpertColumnsVisible(visible) {
  document.querySelectorAll('th.expert-col').forEach(el => {
    el.classList.toggle('hidden', !visible);
  });
}

/* ── Auto-refresh (unified) ── */
function applyAutoInterval(ms) {
  autoMs = ms;
  autoIdx = AUTO_CHOICES.indexOf(ms);
  if (timerAuto) {
    clearInterval(timerAuto);
    timerAuto = null;
  }
  timerAuto = setInterval(loadStatus, autoMs);
  autoBtn.textContent = `자동 갱신: ${autoMs / 1000}초`;
  autoBtn.classList.add('active');
}

refreshBtn.addEventListener('click', loadStatus);
autoBtn.addEventListener('click', () => {
  const nextIdx = (autoIdx + 1) % AUTO_CHOICES.length;
  applyAutoInterval(AUTO_CHOICES[nextIdx]);
  loadStatus();
});
expertBtn.addEventListener('click', () => {
  expertMode = !expertMode;
  expertBtn.textContent = expertMode ? '전문가모드: 켜짐' : '전문가모드: 꺼짐';
  expertBtn.classList.toggle('active', expertMode);
  setExpertColumnsVisible(expertMode);
  loadStatus();
});

/* ── Init ── */
setExpertColumnsVisible(false);
loadStatus();
applyAutoInterval(autoMs);
</script>
</body>
</html>
