<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HV Monitor</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f9fc;
        --panel: #ffffff;
        --border: #dfe7f5;
        --text: #1c2a44;
        --accent: #3d7bfd;
        --accent-dark: #2f63d1;
        --success: #22a06b;
        --danger: #d64545;
        --muted: #6b7b95;
        font-family: 'Inter', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        max-width: 840px;
        margin: 0 auto;
        padding: 28px 24px 48px;
      }

      header {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
      }

      .title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .status {
        padding: 10px 16px;
        border-radius: 999px;
        font-size: 15px;
        background: #fff4d6;
        color: #b26c08;
        border: 1px solid #ffe1a6;
      }

      .status.ok {
        background: #e6f7ef;
        border-color: #b7ebd6;
        color: var(--success);
      }

      .status.error {
        background: #fdeeee;
        border-color: #f8c0c0;
        color: var(--danger);
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(24, 56, 149, 0.08);
        margin-bottom: 24px;
      }

      label {
        font-weight: 600;
        font-size: 14px;
        color: var(--muted);
        display: block;
        margin-bottom: 8px;
      }

      .mode-buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mode-btn {
        border: 1px solid var(--border);
        background: #edf1ff;
        color: var(--text);
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 14px;
      }

      .mode-btn.active {
        border-color: var(--accent);
        background: rgba(61, 123, 253, 0.18);
        color: var(--accent);
        font-weight: 600;
      }

      .primary.compact {
        padding: 8px 16px;
        font-size: 14px;
      }

      button {
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .primary {
        background: var(--accent);
        color: #fff;
      }

      .primary:hover {
        background: var(--accent-dark);
      }

      .ghost {
        background: #f1f4fb;
        color: var(--muted);
      }

      .ghost:hover {
        background: #e1e7f5;
      }

      .monitor-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 16px;
      }

      .monitor-card {
        background: #0e1426;
        border-radius: 16px;
        padding: 16px;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .monitor-card h3 {
        margin: 0 0 10px 0;
        font-size: 18px;
        color: #e2e7ff;
      }

      .monitor-card pre {
        background: transparent;
        color: #f8f8f2;
        margin: 0;
        padding: 0;
        min-height: 420px;
        max-height: 700px;
        overflow-y: auto;
        font-size: 13px;
        line-height: 1.4;
        white-space: pre-wrap;
      }

      .log-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .log-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: 60vh;
        overflow-y: auto;
      }

      .log-entry {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        background: #fdfefe;
      }

      .log-entry.success {
        border-color: rgba(34, 160, 107, 0.4);
      }

      .log-entry.failure {
        border-color: rgba(214, 69, 69, 0.4);
      }

      .log-entry h3 {
        margin: 0 0 8px 0;
        font-size: 16px;
      }

      .meta {
        font-size: 13px;
        color: var(--muted);
        margin-bottom: 12px;
      }

      pre {
        background: #0e1426;
        color: #f8f8f2;
        border-radius: 12px;
        padding: 12px;
        overflow-x: auto;
        font-size: 13px;
        margin: 0;
      }

      .stderr {
        margin-top: 8px;
        background: #290b0b;
        border: 1px solid rgba(214, 69, 69, 0.5);
      }

      small {
        display: block;
        margin-top: 8px;
        color: var(--muted);
      }

      @media (max-width: 640px) {
        .container {
          padding: 24px 16px 40px;
        }

        header {
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="title-row">
          <h1>⚡ HV Monitor</h1>
          <div class="mode-buttons">
            <button class="mode-btn" data-mode="vmon">VMon</button>
            <button class="mode-btn active" data-mode="imon">IMon</button>
            <button id="runNowBtn" class="primary compact">즉시 새로고침</button>
          </div>
        </div>
        <div id="connectionStatus" class="status">⏳ 연결 확인 중...</div>
      </header>

      <section class="panel latest-section">
        <div class="monitor-grid">
          <div class="monitor-card">
            <h3>Status</h3>
            <pre id="statusOutput">(데이터 없음)</pre>
          </div>
          <div class="monitor-card">
            <h3 id="measurementTitle">IMon</h3>
            <pre id="measurementOutput">(데이터 없음)</pre>
          </div>
        </div>
      </section>
    </div>

    <script>
      const STATUS_ENDPOINT = '/hv-monitor/status';
      const DISCONNECT_ENDPOINT = '/hv-monitor/disconnect';
      const POLL_INTERVAL = 2000;
      const STATUS_COMMAND = './HVWrappdemo --ch all --status';
      const MODE_LABELS = {
        vmon: 'VMon',
        imon: 'IMon',
      };
      const MODE_COMMANDS = {
        vmon: './HVWrappdemo --ch all --VMon',
        imon: './HVWrappdemo --ch all --IMon',
      };

      const statusEl = document.getElementById('connectionStatus');
      const runNowBtn = document.getElementById('runNowBtn');
      const modeButtons = document.querySelectorAll('.mode-btn');
      const measurementTitle = document.getElementById('measurementTitle');
      const measurementOutput = document.getElementById('measurementOutput');
      const statusOutput = document.getElementById('statusOutput');

      let pollTimer = null;
      let currentMode = 'imon';

      function updateStatus(text, variant) {
        statusEl.textContent = text;
        statusEl.className = `status ${variant || ''}`.trim();
      }

      function updateMeasurementTitle(mode) {
        measurementTitle.textContent = MODE_LABELS[mode] || MODE_LABELS.vmon;
      }

      function formatTimestamp(ts) {
        try {
          return new Date(ts).toLocaleString();
        } catch (_) {
          return ts;
        }
      }

      function escapeHtml(str) {
        return (str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function getOutputText(text) {
        return text && text.trim().length ? text : '(출력 없음)';
      }

      function updateLatestOutputs(data) {
        const measurement = data.measurement || {};
        const statusInfo = data.status || {};
        statusOutput.textContent = getOutputText(statusInfo.stdout || statusInfo.stderr);
        measurementOutput.textContent = getOutputText(measurement.stdout || measurement.stderr);
      }

      async function fetchHvStatus(trigger = 'auto') {
        const mode = currentMode;
        try {
          const response = await fetch(`${STATUS_ENDPOINT}?mode=${encodeURIComponent(mode)}`, {
            headers: { 'Cache-Control': 'no-cache' },
          });
          const data = await response.json();

          if (!response.ok || !data.success) {
            throw new Error(data.error || '명령 실행 실패');
          }

          if (data.mode && MODE_LABELS[data.mode]) {
            currentMode = data.mode;
            highlightModeButton(currentMode);
          }

          updateMeasurementTitle(currentMode);
          updateLatestOutputs(data);
          updateStatus('🟢 연결 양호', 'ok');
        } catch (error) {
          updateStatus(`🔴 ${error.message}`, 'error');
          measurementOutput.textContent = `(에러) ${error.message}`;
          statusOutput.textContent = `(에러) ${error.message}`;
        }
      }

      function highlightModeButton(mode) {
        modeButtons.forEach((btn) => {
          btn.classList.toggle('active', btn.dataset.mode === mode);
        });
      }

      function startPolling() {
        if (!pollTimer) {
          pollTimer = setInterval(() => fetchHvStatus('auto'), POLL_INTERVAL);
        }
      }

      function stopPolling() {
        if (pollTimer) {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      async function disconnectHVMonitor() {
        stopPolling();
        try {
          await fetch(DISCONNECT_ENDPOINT, { method: 'POST', keepalive: true });
        } catch (error) {
          console.warn('HV disconnect failed:', error);
        }
      }

      function setMode(mode) {
        if (!MODE_LABELS[mode]) return;
        currentMode = mode;
        highlightModeButton(mode);
        updateMeasurementTitle(mode);
        fetchHvStatus('manual');
      }

      modeButtons.forEach((btn) => {
        btn.addEventListener('click', () => setMode(btn.dataset.mode));
      });

      runNowBtn.addEventListener('click', () => fetchHvStatus('manual'));
      window.addEventListener('focus', startPolling);
      window.addEventListener('blur', stopPolling);
      window.addEventListener('beforeunload', () => {
        if (navigator.sendBeacon) {
          navigator.sendBeacon(DISCONNECT_ENDPOINT, '');
        } else {
          disconnectHVMonitor();
        }
      });

      // 초기 실행
      highlightModeButton(currentMode);
      updateMeasurementTitle(currentMode);
      fetchHvStatus('manual');
      startPolling();
    </script>
  </body>
</html>
